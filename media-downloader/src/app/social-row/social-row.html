<div class="social-row-container">
  <div class="subtitle anim-fade-in delay-5">SUPPORTED PLATFORMS</div>
  <div class="social-list anim-fade-up">
    @for (social of socials; track social.name) {
      <div
        class="social-card glass card-3d"
        [style.--social-color]="social.color"
        [style.--social-glow]="social.glow"
      >
        <div class="icon-wrapper">
          <i [class]="getIconClass(social.icon)"></i>
        </div>
        <div class="social-name">{{ social.name }}</div>
        <div class="glow-layer"></div>
      </div>
    }
  </div>
</div>
