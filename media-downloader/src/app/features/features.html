<section class="features-section" id="features">
  <div class="section-header anim-fade-in delay-6">
    <h2 class="grad-text">POWERFUL FEATURES</h2>
    <p class="subtitle">ENGINEERED FOR SUPREME PERFORMANCE</p>
  </div>

  <div class="features-grid">
    @for (feature of features; track feature.title) {
      <div class="feature-card glass card-3d" [style.--feature-color]="feature.color">
        <div class="feature-icon">
          <i [class]="'bi bi-' + feature.icon"></i>
        </div>
        <h3 class="feature-title">{{ feature.title }}</h3>
        <p class="feature-desc">{{ feature.description }}</p>
        <div class="feature-glow"></div>
      </div>
    }
  </div>
</section>
